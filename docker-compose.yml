services:
  # --- SECURITY LAYER ---
  docker-socket-proxy:
    container_name: docker-socket-proxy
    image: tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1
      - LOGS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
      - /tmp # Added for haproxy config generation
    restart: unless-stopped

  # --- MONITORING LAYER ---
  victoriametrics:
    container_name: victoriametrics
    image: victoriametrics/victoria-metrics:v1.101.0
    volumes:
      - vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=0.0.0.0:8428"
      - "--loggerFormat=json"
      - "--memory.allowedPercent=60"
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 160M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  victorialogs:
    container_name: victorialogs
    image: victoriametrics/victoria-logs:v0.12.0-victorialogs
    volumes:
      - vldata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=0.0.0.0:9428"
      - "--loggerFormat=json"
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 160M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  vector:
    container_name: vector
    image: timberio/vector:0.38.0-alpine
    volumes:
      - ./config/vector/vector.toml:/etc/vector/vector.toml:ro
      - vector_data:/var/lib/vector
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - HOSTNAME=${HOSTNAME:-vps-host}
      - VECTOR_SELF_LABEL=vector
    networks:
      - monitoring_nw
    depends_on:
      docker-socket-proxy:
        condition: service_started
      victoriametrics:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 96M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana-oss:11.0.0
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    networks:
      - monitoring_nw
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 96M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    restart: unless-stopped

  # --- DATABASE LAYER ---
  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg17
    shm_size: 128mb
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "password_encryption=scram-sha-256"
      - "-c"
      - "shared_buffers=128MB"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_MULTIPLE_DATABASES=${POSTGRES_MULTIPLE_DATABASES}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/postgres/init-db:/docker-entrypoint-initdb.d
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: redis
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "32mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--rename-command"
      - "FLUSHALL"
      - ""
      - "--rename-command"
      - "FLUSHDB"
      - ""
      - "--rename-command"
      - "DEBUG"
      - ""
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 48M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  monitoring_nw:
    name: monitoring_nw
    driver: bridge

volumes:
  vmdata:
  vldata:
  vector_data:
  grafana_data:
  pgdata:
  redisdata:
