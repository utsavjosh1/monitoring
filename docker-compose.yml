services:
  victoriametrics:
    container_name: victoriametrics
    image: victoriametrics/victoria-metrics:v1.101.0
    # PORTS REMOVED: Internal communication only
    volumes:
      - vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
      - "-loggerFormat=json"
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  victorialogs:
    container_name: victorialogs
    image: victoriametrics/victoria-logs:v0.12.0-victorialogs
    # PORTS REMOVED: Internal communication only
    volumes:
      - vldata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:9428"
      - "-loggerFormat=json"
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  vector:
    container_name: vector
    image: timberio/vector:0.38.0-alpine
    volumes:
      - ./config/vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - HOSTNAME=vps-host
      - VECTOR_SELF_LABEL=vector
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          memory: 128M # Increased slightly to handle metrics + logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  grafana:
    container_name: grafana
    image: grafana/grafana-oss:11.0.0
    ports:
      - "3000:3000" # Only Grafana is exposed
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-https://discord.com/api/webhooks/placeholder}
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg17
    command: ["postgres", "-c", "max_connections=50"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

networks:
  monitoring_nw:
    name: monitoring_nw
    driver: bridge

volumes:
  vmdata:
  vldata:
  grafana_data:
  pgdata:
  redisdata:
